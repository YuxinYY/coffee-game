<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>☕ Coffee Craft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app"></div>

  <!-- Progress Bar -->
  <div id="progress-bar" class="hidden">
    <div id="progress-track">
      <div class="progress-step" data-step="1">Size</div>
      <div class="progress-step" data-step="2">Temp</div>
      <div class="progress-step" data-step="3">Cup</div>
      <div class="progress-step" data-step="4">Base</div>
      <div class="progress-step" data-step="5">Syrup</div>
      <div class="progress-step" data-step="6">Milk</div>
      <div class="progress-step" data-step="7">Top</div>
      <div class="progress-step" data-step="8">Done</div>
    </div>
  </div>

  <!-- Navigation -->
  <div id="nav" class="hidden">
    <button id="back-btn" class="nav-btn">← Back</button>
    <button id="next-btn" class="nav-btn" disabled>Next →</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
